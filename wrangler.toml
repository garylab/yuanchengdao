name = "yuanchengdao"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
SITE_URL = "https://yuanchengdao.com"
STATIC_URL = "https://static.yuanchengdao.com"

[[d1_databases]]
binding = "DB"
database_name = "yuancheng-jobs"
database_id = "placeholder-id"

[[r2_buckets]]
binding = "R2"
bucket_name = "yuanchengdao-static"

# Cron trigger to fetch new jobs every 6 hours
[triggers]
crons = ["0 */6 * * *"]
